  function sortPosts(arr, field, dir) {
    var s = arr.slice();
    s.sort(function(a, b) {
      var va = a[field], vb = b[field];
      if (va == null) va = ''; if (vb == null) vb = '';
      if (va < vb) return dir === 'asc' ? -1 : 1;
      if (va > vb) return dir === 'asc' ? 1 : -1;

  function renderPage(sorted) {

    var start = (currentPage - 1) * PAGE_SIZE;

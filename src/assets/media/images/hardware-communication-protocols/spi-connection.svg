<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="monospace" font-size="13">
  <rect width="900" height="360" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="24" fill="#212529" font-size="15" font-weight="bold" text-anchor="middle">SPI 总线拓扑示意</text>

  <!-- === MASTER === -->
  <rect x="40" y="40" width="140" height="100" rx="8" fill="#e7f5ff" stroke="#0d6efd" stroke-width="2"/>
  <text x="110" y="65" fill="#0d6efd" font-size="14" font-weight="bold" text-anchor="middle">主设备 (Master)</text>
  <text x="110" y="83" fill="#495057" font-size="11" text-anchor="middle">MCU / SoC</text>
  <!-- MCU pins -->
  <rect x="155" y="60" width="25" height="16" rx="3" fill="#0d6efd"/>
  <text x="167" y="72" fill="white" font-size="10" text-anchor="middle">SCK</text>
  <rect x="155" y="85" width="25" height="16" rx="3" fill="#0d6efd"/>
  <text x="167" y="97" fill="white" font-size="10" text-anchor="middle">MOSI</text>
  <rect x="155" y="110" width="25" height="16" rx="3" fill="#0d6efd"/>
  <text x="167" y="122" fill="white" font-size="10" text-anchor="middle">MISO</text>

  <!-- Bus lines -->
  <!-- SCK bus -->
  <line x1="180" y1="68" x2="350" y2="68" stroke="#0d6efd" stroke-width="2.5"/>
  <line x1="350" y1="68" x2="520" y2="68" stroke="#0d6efd" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="520" y1="68" x2="700" y2="68" stroke="#0d6efd" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- MOSI bus -->
  <line x1="180" y1="93" x2="350" y2="93" stroke="#6610f2" stroke-width="2.5"/>
  <line x1="350" y1="93" x2="520" y2="93" stroke="#6610f2" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="520" y1="93" x2="700" y2="93" stroke="#6610f2" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- MISO bus -->
  <line x1="180" y1="118" x2="350" y2="118" stroke="#198754" stroke-width="2.5"/>
  <line x1="350" y1="118" x2="520" y2="118" stroke="#198754" stroke-width="2.5" stroke-dasharray="6,4"/>
  <line x1="520" y1="118" x2="700" y2="118" stroke="#198754" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Bus labels at top -->
  <text x="315" y="60" fill="#0d6efd" font-size="12" font-weight="bold" text-anchor="middle">SCK</text>
  <text x="315" y="85" fill="#6610f2" font-size="12" font-weight="bold" text-anchor="middle">MOSI</text>
  <text x="315" y="110" fill="#198754" font-size="12" font-weight="bold" text-anchor="middle">MISO</text>

  <!-- === SLAVE 1 === -->
  <rect x="360" y="185" width="140" height="100" rx="8" fill="#fff3e0" stroke="#fd7e14" stroke-width="2"/>
  <text x="430" y="210" fill="#fd7e14" font-size="13" font-weight="bold" text-anchor="middle">从设备 1 (Slave 1)</text>
  <text x="430" y="228" fill="#495057" font-size="11" text-anchor="middle">Flash / ADC</text>
  <rect x="355" y="205" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="367" y="217" fill="white" font-size="10" text-anchor="middle">SS1</text>
  <rect x="505" y="220" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="517" y="232" fill="white" font-size="10" text-anchor="middle">SS1</text>

  <!-- === SLAVE 2 === -->
  <rect x="360" y="310" width="140" height="100" rx="8" fill="#fff3e0" stroke="#fd7e14" stroke-width="2"/>
  <text x="430" y="335" fill="#fd7e14" font-size="13" font-weight="bold" text-anchor="middle">从设备 2 (Slave 2)</text>
  <text x="430" y="353" fill="#495057" font-size="11" text-anchor="middle">SD 卡 / LCD</text>
  <rect x="355" y="330" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="367" y="342" fill="white" font-size="10" text-anchor="middle">SS2</text>
  <rect x="505" y="345" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="517" y="357" fill="white" font-size="10" text-anchor="middle">SS2</text>

  <!-- === SLAVE 3 === -->
  <rect x="710" y="185" width="140" height="100" rx="8" fill="#fff3e0" stroke="#fd7e14" stroke-width="2"/>
  <text x="780" y="210" fill="#fd7e14" font-size="13" font-weight="bold" text-anchor="middle">从设备 3 (Slave 3)</text>
  <text x="780" y="228" fill="#495057" font-size="11" text-anchor="middle">Sensor</text>
  <rect x="705" y="205" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="717" y="217" fill="white" font-size="10" text-anchor="middle">SS3</text>
  <rect x="855" y="220" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="867" y="232" fill="white" font-size="10" text-anchor="middle">SS3</text>

  <!-- === SLAVE 4 === -->
  <rect x="710" y="310" width="140" height="100" rx="8" fill="#fff3e0" stroke="#fd7e14" stroke-width="2"/>
  <text x="780" y="335" fill="#fd7e14" font-size="13" font-weight="bold" text-anchor="middle">从设备 4 (Slave 4)</text>
  <text x="780" y="353" fill="#495057" font-size="11" text-anchor="middle">Sensor</text>
  <rect x="705" y="330" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="717" y="342" fill="white" font-size="10" text-anchor="middle">SS4</text>
  <rect x="855" y="345" width="25" height="16" rx="3" fill="#fd7e14"/>
  <text x="867" y="357" fill="white" font-size="10" text-anchor="middle">SS4</text>

  <!-- Dashed bus lines to slaves -->
  <line x1="500" y1="93" x2="500" y2="205" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="93" x2="500" y2="330" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="68" x2="700" y2="205" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="68" x2="700" y2="330" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="93" x2="700" y2="205" stroke="#6610f2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="93" x2="700" y2="330" stroke="#6610f2" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="118" x2="700" y2="205" stroke="#198754" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="118" x2="700" y2="330" stroke="#198754" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Note box -->
  <rect x="40" y="440" width="860" height="50" rx="6" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/>
  <text x="60" y="458" fill="#856404" font-size="12" font-weight="bold">注意：</text>
  <text x="110" y="458" fill="#856404" font-size="12">SCK / MOSI / MISO 三根线由所有设备共享，每增加一个从设备需要额外一根 CS 片选线。</text>
  <text x="60" y="478" fill="#856404" font-size="12">主设备通过拉低对应从设备的 CS 线来选中通信对象。被选中的从设备驱动 MISO 线，未选中的设备必须保持高阻抗（不驱动总线）。</text>

  <!-- Legend -->
  <rect x="40" y="160" width="12" height="12" rx="2" fill="#0d6efd"/>
  <text x="58" y="170" fill="#495057" font-size="11">时钟 (SCK)</text>
  <rect x="130" y="160" width="12" height="12" rx="2" fill="#6610f2"/>
  <text x="148" y="170" fill="#495057" font-size="11">主输出 (MOSI)</text>
  <rect x="230" y="160" width="12" height="12" rx="2" fill="#198754"/>
  <text x="248" y="170" fill="#495057" font-size="11">主输入 (MISO)</text>
  <rect x="320" y="160" width="12" height="12" rx="2" fill="#fd7e14"/>
  <text x="338" y="170" fill="#495057" font-size="11">片选 (CS/SS)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="900" height="240" fill="#f8f9fa"/>
  <!-- Grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#e9ecef" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#e9ecef" stroke-width="1"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#e9ecef" stroke-width="1"/>
  <!-- Labels column -->
  <text x="8" y="58" fill="#495057" font-size="12">TX/RX</text>
  <text x="8" y="138" fill="#495057" font-size="12">时钟采样点</text>
  <text x="8" y="218" fill="#495057" font-size="12">bit 索引</text>

  <!-- TX line at HIGH (idle) -->
  <polyline points="50,55 50,25 850,25" fill="none" stroke="#6c757d" stroke-width="2"/>
  <!-- Start bit: pull LOW -->
  <polyline points="50,25 90,25 90,55 130,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D0: 0 -->
  <polyline points="130,55 170,55 170,25 210,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D1: 1 -->
  <polyline points="210,25 250,25 250,55 290,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D2: 0 -->
  <polyline points="290,55 330,55 330,25 370,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D3: 1 -->
  <polyline points="370,25 410,25 410,55 450,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D4: 0 -->
  <polyline points="450,55 490,55 490,25 530,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D5: 1 -->
  <polyline points="530,25 570,25 570,55 610,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D6: 0 -->
  <polyline points="610,55 650,55 650,25 690,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- D7: 1 -->
  <polyline points="690,25 730,25 730,55 770,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- Stop bit: HIGH -->
  <polyline points="770,55 810,55 810,25 850,25" fill="none" stroke="#198754" stroke-width="2.5"/>

  <!-- Sampling clock ticks -->
  <line x1="90" y1="80" x2="90" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="80" x2="170" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="250" y1="80" x2="250" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="330" y1="80" x2="330" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="80" x2="410" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="490" y1="80" x2="490" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="80" x2="570" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="650" y1="80" x2="650" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="730" y1="80" x2="730" y2="160" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Clock dots -->
  <circle cx="90" cy="138" r="4" fill="#dc3545"/>
  <circle cx="170" cy="138" r="4" fill="#dc3545"/>
  <circle cx="250" cy="138" r="4" fill="#dc3545"/>
  <circle cx="330" cy="138" r="4" fill="#dc3545"/>
  <circle cx="410" cy="138" r="4" fill="#dc3545"/>
  <circle cx="490" cy="138" r="4" fill="#dc3545"/>
  <circle cx="570" cy="138" r="4" fill="#dc3545"/>
  <circle cx="650" cy="138" r="4" fill="#dc3545"/>
  <circle cx="730" cy="138" r="4" fill="#dc3545"/>

  <!-- Bit labels -->
  <text x="20" y="85" fill="#495057">空闲</text>
  <text x="70" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">S</text>
  <text x="150" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D0</text>
  <text x="230" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D1</text>
  <text x="310" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D2</text>
  <text x="390" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D3</text>
  <text x="470" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D4</text>
  <text x="550" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D5</text>
  <text x="630" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D6</text>
  <text x="710" y="210" fill="#0d6efd" text-anchor="middle" font-size="12">D7</text>
  <text x="790" y="210" fill="#198754" text-anchor="middle" font-size="12">P</text>
  <text x="830" y="210" fill="#198754" text-anchor="middle" font-size="12">T</text>

  <!-- Region annotations -->
  <rect x="50" y="5" width="40" height="18" rx="4" fill="#0d6efd" opacity="0.15"/>
  <text x="70" y="17" fill="#0d6efd" text-anchor="middle" font-size="11">起始</text>
  <rect x="130" y="5" width="600" height="18" rx="4" fill="#198754" opacity="0.12"/>
  <text x="430" y="17" fill="#198754" text-anchor="middle" font-size="11">数据 (8 bit, LSB 先发)</text>
  <rect x="770" y="5" width="80" height="18" rx="4" fill="#6c757d" opacity="0.15"/>
  <text x="810" y="17" fill="#6c757d" text-anchor="middle" font-size="11">停止</text>

  <!-- Title -->
  <text x="450" y="235" fill="#343a40" font-size="13" text-anchor="middle">UART 帧结构 · 8N1 格式（8 数据位 / 无校验 / 1 停止位）</text>
</svg>
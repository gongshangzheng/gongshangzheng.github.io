<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="monospace" font-size="12">
  <rect width="900" height="480" fill="#f8f9fa"/>

  <text x="450" y="24" fill="#212529" font-size="15" font-weight="bold" text-anchor="middle">六种硬件通信协议全景雷达图</text>
  <text x="450" y="42" fill="#6c757d" font-size="11" text-anchor="middle">各维度评分（1=最低 / 5=最高）| 仅供定性比较，数值代表相对水平</text>

  <!-- Radar chart center -->
  <text x="450" y="265" fill="#495057" font-size="12" text-anchor="middle">速度 | 抗干扰 | 简洁性 | 距离 | 成本 | 多设备</text>

  <!-- Radar axes (6 axes at 60° intervals, center at 450,250, radius 180) -->
  <!-- v1: top (speed) -->
  <line x1="450" y1="250" x2="450" y2="70" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="58" fill="#495057" font-size="11" text-anchor="middle">速度</text>
  <!-- v2: top-right (EMI) -->
  <line x1="450" y1="250" x2="605" y2="160" stroke="#dee2e6" stroke-width="1"/>
  <text x="620" y="152" fill="#495057" font-size="11">抗干扰</text>
  <!-- v3: bottom-right (simplicity) -->
  <line x1="450" y1="250" x2="605" y2="340" stroke="#dee2e6" stroke-width="1"/>
  <text x="620" y="348" fill="#495057" font-size="11">简洁性</text>
  <!-- v4: bottom (distance) -->
  <line x1="450" y1="250" x2="450" y2="430" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="446" fill="#495057" font-size="11" text-anchor="middle">距离</text>
  <!-- v5: bottom-left (cost) -->
  <line x1="450" y1="250" x2="295" y2="340" stroke="#dee2e6" stroke-width="1"/>
  <text x="280" y="348" fill="#495057" font-size="11">成本</text>
  <!-- v6: top-left (multi-device) -->
  <line x1="450" y1="250" x2="295" y2="160" stroke="#dee2e6" stroke-width="1"/>
  <text x="280" y="152" fill="#495057" font-size="11">多设备</text>

  <!-- Concentric circles (radius 45, 90, 135, 180) -->
  <circle cx="450" cy="250" r="45" fill="none" stroke="#dee2e6" stroke-width="0.8"/>
  <circle cx="450" cy="250" r="90" fill="none" stroke="#dee2e6" stroke-width="0.8"/>
  <circle cx="450" cy="250" r="135" fill="none" stroke="#dee2e6" stroke-width="0.8"/>
  <circle cx="450" cy="250" r="180" fill="none" stroke="#dee2e6" stroke-width="0.8"/>

  <!-- Labels for concentric circles (right side only) -->
  <text x="630" y="255" fill="#adb5bd" font-size="10">1</text>
  <text x="540" y="255" fill="#adb5bd" font-size="10">2</text>
  <text x="450" y="255" fill="#adb5bd" font-size="10">3</text>
  <text x="360" y="255" fill="#adb5bd" font-size="10">4</text>
  <text x="270" y="255" fill="#adb5bd" font-size="10">5</text>

  <!-- Calculate polar points: (cx + r*sin(angle), cy - r*cos(angle)) -->
  <!-- For each axis at angles 0°, 60°, 120°, 180°, 240°, 300° (clockwise from top) -->
  <!-- axis 0 (speed, top): angle=270° in standard coords -->
  <!-- Actually: top = 270°, top-right = 330°, bottom-right = 30°, bottom = 90°, bottom-left = 150°, top-left = 210° -->

  <!-- UART polygon: speed=2, EMI=1, simplicity=4, distance=2, cost=4, devices=2 -->
  <!-- angles: 0(speed), 60(EMI), 120(simplex), 180(dist), 240(cost), 300(devices) -->
  <!-- But radar is drawn with top=0, right=60, bottom-right=120, bottom=180, bottom-left=240, top-left=300 -->

  <!-- Points for each protocol (r=normalized_score*36 for max r=180) -->
  <!-- UART: speed=2, EMI=1, simplicity=4, distance=2, cost=4, devices=1 -->
  <!-- speed→angle0: r=2→72px; EMI→angle60: r=1→36px; simplex→angle120: r=4→144px; dist→angle180: r=2→72px; cost→angle240: r=4→144px; devices→angle300: r=1→36px -->

  <!-- Helper: x = 450 + r*sin(θ*π/180), y = 250 - r*cos(θ*π/180) -->
  <!-- θ=0°(top): sin0=0, cos0=1 → x=450, y=250-r -->
  <!-- θ=60°: sin60≈0.866, cos60=0.5 → x=450+r*0.866, y=250-r*0.5 -->
  <!-- θ=120°: sin120≈0.866, cos120=-0.5 → x=450+r*0.866, y=250+r*0.5 -->
  <!-- θ=180°(bottom): x=450, y=250+r -->
  <!-- θ=240°: sin240≈-0.866, cos240=-0.5 → x=450-r*0.866, y=250+r*0.5 -->
  <!-- θ=300°: sin300≈-0.866, cos300=0.5 → x=450-r*0.866, y=250-r*0.5 -->

  <!-- UART: [2,1,4,2,4,1] -->
  <polygon
    points="450,178 481,232 559,295 450,322 358,295 381,232"
    fill="#0d6efd" opacity="0.12" stroke="#0d6efd" stroke-width="1.5" stroke-dasharray="none"/>
  <circle cx="450" cy="178" r="3" fill="#0d6efd"/>
  <circle cx="481" cy="232" r="3" fill="#0d6efd"/>
  <circle cx="559" cy="295" r="3" fill="#0d6efd"/>
  <circle cx="450" cy="322" r="3" fill="#0d6efd"/>
  <circle cx="358" cy="295" r="3" fill="#0d6efd"/>
  <circle cx="381" cy="232" r="3" fill="#0d6efd"/>
  <text x="432" y="172" fill="#0d6efd" font-size="11" font-weight="bold">UART</text>

  <!-- SPI: speed=5, EMI=3, simplicity=3, distance=1, cost=3, devices=2 -->
  <polygon
    points="450,70 481,232 559,295 450,430 358,295 295,232"
    fill="#6610f2" opacity="0.10" stroke="#6610f2" stroke-width="1.5"/>
  <text x="432" y="64" fill="#6610f2" font-size="11" font-weight="bold">SPI</text>

  <!-- I2C: speed=3, EMI=3, simplicity=3, distance=1, cost=4, devices=4 -->
  <polygon
    points="450,142 559,232 559,295 450,430 295,295 295,232"
    fill="#198754" opacity="0.10" stroke="#198754" stroke-width="1.5"/>
  <text x="432" y="136" fill="#198754" font-size="11" font-weight="bold">I²C</text>

  <!-- CAN: speed=3, EMI=5, simplicity=2, distance=5, cost=2, devices=4 -->
  <polygon
    points="450,142 559,160 559,340 450,250 295,340 295,160"
    fill="#dc3545" opacity="0.10" stroke="#dc3545" stroke-width="1.5"/>
  <text x="432" y="136" fill="#dc3545" font-size="11" font-weight="bold">CAN</text>

  <!-- RS-232: speed=2, EMI=3, simplicity=3, distance=3, cost=3, devices=1 -->
  <polygon
    points="450,178 481,232 559,295 450,358 358,295 295,232"
    fill="#fd7e14" opacity="0.10" stroke="#fd7e14" stroke-width="1.5"/>
  <text x="432" y="172" fill="#fd7e14" font-size="11" font-weight="bold">RS-232</text>

  <!-- 1-Wire: speed=1, EMI=1, simplicity=2, distance=3, cost=4, devices=3 -->
  <polygon
    points="450,214 419,232 403,295 450,322 502,295 519,232"
    fill="#9c27b0" opacity="0.10" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="432" y="208" fill="#9c27b0" font-size="11" font-weight="bold">1-Wire</text>

  <!-- Legend -->
  <rect x="40" y="385" width="820" height="80" rx="8" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <rect x="60" y="395" width="12" height="12" rx="2" fill="#0d6efd" opacity="0.4"/>
  <text x="78" y="405" fill="#495057" font-size="11">UART</text>
  <rect x="140" y="395" width="12" height="12" rx="2" fill="#6610f2" opacity="0.4"/>
  <text x="158" y="405" fill="#495057" font-size="11">SPI</text>
  <rect x="210" y="395" width="12" height="12" rx="2" fill="#198754" opacity="0.4"/>
  <text x="228" y="405" fill="#495057" font-size="11">I²C</text>
  <rect x="290" y="395" width="12" height="12" rx="2" fill="#dc3545" opacity="0.4"/>
  <text x="308" y="405" fill="#495057" font-size="11">CAN</text>
  <rect x="360" y="395" width="12" height="12" rx="2" fill="#fd7e14" opacity="0.4"/>
  <text x="378" y="405" fill="#495057" font-size="11">RS-232</text>
  <rect x="460" y="395" width="12" height="12" rx="2" fill="#9c27b0" opacity="0.4"/>
  <text x="478" y="405" fill="#495057" font-size="11">1-Wire</text>

  <text x="60" y="426" fill="#495057" font-size="11">速度：数据传输率上限 | 抗干扰：差分/噪声容限 | 简洁性：接线/配置难度 |</text>
  <text x="60" y="444" fill="#495057" font-size="11">距离：信号完整传输的最大线缆长度 | 成本：外设芯片/布线复杂度 | 多设备：一组线可挂载节点数</text>
  <text x="60" y="462" fill="#6c757d" font-size="10">注：各维度为相对评分，真实选型需结合具体应用需求。以上数值为典型值，实际性能因实现而异。</text>
</svg>
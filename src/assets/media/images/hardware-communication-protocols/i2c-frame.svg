<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="monospace" font-size="13">
  <rect width="900" height="320" fill="#f8f9fa"/>

  <text x="450" y="24" fill="#212529" font-size="15" font-weight="bold" text-anchor="middle">I²C 数据帧结构（读操作示例）</text>

  <!-- SDA line: idle HIGH -->
  <polyline points="0,55 40,55 40,55 80,55" fill="none" stroke="#6c757d" stroke-width="2"/>
  <!-- START condition: SCL HIGH, SDA pulls LOW -->
  <line x1="80" y1="55" x2="80" y2="25" stroke="#343a40" stroke-width="2"/>
  <polyline points="80,25 120,25 120,55 160,55" fill="none" stroke="#dc3545" stroke-width="2.5"/>
  <rect x="95" y="5" width="40" height="18" rx="4" fill="#dc3545" opacity="0.15"/>
  <text x="115" y="17" fill="#dc3545" text-anchor="middle" font-size="11" font-weight="bold">START</text>

  <!-- Address field: 7-bit + R/W -->
  <polyline points="160,55 200,55 200,25 240,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="240,25 280,25 280,55 320,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="320,55 360,55 360,25 400,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="400,25 440,25 440,55 480,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="480,55 520,55 520,25 560,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="560,25 600,25 600,55 640,55" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="640,55 680,55 680,25 720,25" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- R/W bit: 1 (read) -->
  <polyline points="720,25 760,25 760,55 800,55" fill="none" stroke="#6c757d" stroke-width="2.5"/>
  <rect x="680" y="5" width="40" height="18" rx="4" fill="#0d6efd" opacity="0.15"/>
  <text x="700" y="17" fill="#0d6efd" text-anchor="middle" font-size="11">地址 (7 bit)</text>
  <rect x="730" y="5" width="55" height="18" rx="4" fill="#6c757d" opacity="0.15"/>
  <text x="755" y="17" fill="#6c757d" text-anchor="middle" font-size="11">R/W=1</text>

  <!-- ACK bit: slave pulls LOW -->
  <polyline points="800,55 840,55 840,25 880,25" fill="none" stroke="#198754" stroke-width="2.5"/>
  <rect x="810" y="5" width="60" height="18" rx="4" fill="#198754" opacity="0.15"/>
  <text x="835" y="17" fill="#198754" text-anchor="middle" font-size="11">ACK ✓</text>

  <!-- Data byte 1 -->
  <polyline points="40,140 80,140 80,110 120,110" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="120,110 160,110 160,140 200,140" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="200,140 240,140 240,110 280,110" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="280,110 320,110 320,140 360,140" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="360,140 400,140 400,110 440,110" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="440,110 480,110 480,140 520,140" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="520,140 560,140 560,110 600,110" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <polyline points="600,110 640,110 640,140 680,140" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <!-- ACK -->
  <polyline points="680,140 720,140 720,110 760,110" fill="none" stroke="#198754" stroke-width="2.5"/>
  <polyline points="760,110 800,110 800,140 840,140" fill="none" stroke="#198754" stroke-width="2.5"/>
  <polyline points="840,140 880,140 880,110 900,110" fill="none" stroke="#6c757d" stroke-width="2"/>
  <rect x="40" y="75" width="840" height="50" rx="6" fill="#e7f5ff" opacity="0.5"/>
  <text x="240" y="95" fill="#0d6efd" text-anchor="middle" font-size="12">数据字节 (MSB→LSB)</text>
  <text x="720" y="95" fill="#198754" text-anchor="middle" font-size="12">ACK</text>

  <!-- STOP condition -->
  <line x1="870" y1="55" x2="870" y2="25" stroke="#343a40" stroke-width="2"/>
  <polyline points="870,25 900,25 900,55 920,55" fill="none" stroke="#dc3545" stroke-width="2.5"/>
  <rect x="858" y="5" width="40" height="18" rx="4" fill="#dc3545" opacity="0.15"/>
  <text x="873" y="17" fill="#dc3545" text-anchor="middle" font-size="11" font-weight="bold">STOP</text>

  <!-- SCL clock line -->
  <line x1="0" y1="195" x2="900" y2="195" stroke="#e9ecef" stroke-width="1"/>
  <text x="8" y="190" fill="#495057" font-size="11">SCL</text>
  <!-- SDA label -->
  <text x="8" y="47" fill="#495057" font-size="11">SDA</text>

  <!-- Clock ticks on SCL -->
  <line x1="120" y1="200" x2="120" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="200" x2="200" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="200" x2="280" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="200" x2="360" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="200" x2="440" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="520" y1="200" x2="520" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="200" x2="600" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="200" x2="680" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="760" y1="200" x2="760" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="840" y1="200" x2="840" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="880" y1="200" x2="880" y2="230" stroke="#dc3545" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- SCL square wave (simplified) -->
  <polyline points="40,195 80,195 80,205 120,205 120,195 200,195 200,205 280,205 280,195 360,195 360,205 440,205 440,195 520,195 520,205 600,205 600,195 680,195 680,205 760,205 760,195 840,195 840,205 880,205" fill="none" stroke="#dc3545" stroke-width="1.5"/>

  <!-- Field labels -->
  <text x="170" y="260" fill="#495057" font-size="11" text-anchor="middle">位 0</text>
  <text x="250" y="260" fill="#495057" font-size="11" text-anchor="middle">位 1</text>
  <text x="330" y="260" fill="#495057" font-size="11" text-anchor="middle">位 2</text>
  <text x="410" y="260" fill="#495057" font-size="11" text-anchor="middle">位 3</text>
  <text x="490" y="260" fill="#495057" font-size="11" text-anchor="middle">位 4</text>
  <text x="570" y="260" fill="#495057" font-size="11" text-anchor="middle">位 5</text>
  <text x="650" y="260" fill="#495057" font-size="11" text-anchor="middle">位 6</text>
  <text x="730" y="260" fill="#495057" font-size="11" text-anchor="middle">位 7</text>
  <text x="810" y="260" fill="#198754" font-size="11" text-anchor="middle">ACK</text>

  <!-- Legend -->
  <rect x="40" y="280" width="12" height="12" rx="2" fill="#dc3545"/>
  <text x="58" y="290" fill="#495057" font-size="11">START / STOP 条件</text>
  <rect x="200" y="280" width="12" height="12" rx="2" fill="#0d6efd"/>
  <text x="218" y="290" fill="#495057" font-size="11">数据位</text>
  <rect x="310" y="280" width="12" height="12" rx="2" fill="#198754"/>
  <text x="328" y="290" fill="#495057" font-size="11">ACK (SDA 被接收方拉低)</text>
  <rect x="510" y="280" width="12" height="12" rx="2" fill="#6c757d"/>
  <text x="528" y="290" fill="#495057" font-size="11">空闲高电平</text>

  <text x="450" y="310" fill="#343a40" font-size="12" text-anchor="middle">SCL 为高时 SDA 的下降沿 = START；SCL 为高时 SDA 的上升沿 = STOP</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="monospace" font-size="13">
  <rect width="900" height="260" fill="#f8f9fa"/>

  <text x="450" y="22" fill="#212529" font-size="15" font-weight="bold" text-anchor="middle">1-Wire 时间槽编码（60 μs / bit）</text>

  <!-- Data line -->
  <text x="12" y="82" fill="#495057" font-size="12">1-Wire</text>
  <line x1="50" y1="78" x2="850" y2="78" stroke="#6c757d" stroke-width="2"/>

  <!-- Time slots: 4 slots -->
  <!-- Slot 1: Write 1 -->
  <rect x="80" y="40" width="180" height="50" rx="4" fill="#e7f5ff" opacity="0.5"/>
  <polyline points="80,78 100,78 100,60 110,60 110,78 260,78" fill="none" stroke="#0d6efd" stroke-width="2.5"/>
  <text x="170" y="38" fill="#0d6efd" font-size="12" text-anchor="middle" font-weight="bold">写 1：拉低 1-15 μs</text>
  <text x="170" y="70" fill="#495057" font-size="10" text-anchor="middle">Slot 1</text>

  <!-- Slot 2: Write 0 -->
  <rect x="280" y="40" width="180" height="50" rx="4" fill="#fff3e0" opacity="0.5"/>
  <polyline points="280,78 300,78 300,30 420,30 420,78 460,78" fill="none" stroke="#fd7e14" stroke-width="2.5"/>
  <text x="370" y="38" fill="#fd7e14" font-size="12" text-anchor="middle" font-weight="bold">写 0：拉低 60 μs</text>
  <text x="370" y="70" fill="#495057" font-size="10" text-anchor="middle">Slot 2</text>

  <!-- Slot 3: Read -->
  <rect x="480" y="40" width="180" height="50" rx="4" fill="#e8f5e9" opacity="0.5"/>
  <polyline points="480,78 500,78 500,60 510,60 510,78 540,78" fill="none" stroke="#198754" stroke-width="2.5"/>
  <polyline points="540,78 560,78 560,78 580,78 580,30 600,30 600,78 640,78" fill="none" stroke="#198754" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="560" y="38" fill="#198754" font-size="12" text-anchor="middle" font-weight="bold">读：主设备拉低 1 μs</text>
  <text x="570" y="70" fill="#495057" font-size="10" text-anchor="middle">Slot 3</text>
  <text x="590" y="60" fill="#198754" font-size="10" text-anchor="middle">从设备决定</text>

  <!-- Slot 4: Presence Pulse -->
  <rect x="680" y="40" width="180" height="50" rx="4" fill="#f3e5f5" opacity="0.5"/>
  <polyline points="680,78 700,78 700,78 720,78" fill="none" stroke="#6c757d" stroke-width="2.5"/>
  <polyline points="720,78 720,30 740,30 740,78 760,78" fill="none" stroke="#9c27b0" stroke-width="2.5"/>
  <polyline points="760,78 780,78 780,78 840,78" fill="none" stroke="#6c757d" stroke-width="2.5"/>
  <text x="780" y="38" fill="#9c27b0" font-size="12" text-anchor="middle" font-weight="bold">存在脉冲</text>
  <text x="780" y="70" fill="#495057" font-size="10" text-anchor="middle">Slot 4</text>

  <!-- Slot labels at bottom -->
  <text x="170" y="110" fill="#495057" font-size="11" text-anchor="middle">1-15 μs</text>
  <text x="370" y="110" fill="#495057" font-size="11" text-anchor="middle">60 μs</text>
  <text x="570" y="110" fill="#495057" font-size="11" text-anchor="middle">60 μs</text>
  <text x="780" y="110" fill="#495057" font-size="11" text-anchor="middle">60-240 μs</text>

  <!-- Slot dividers -->
  <line x1="260" y1="115" x2="260" y2="155" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="460" y1="115" x2="460" y2="155" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="660" y1="115" x2="660" y2="155" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Note box -->
  <rect x="40" y="120" width="820" height="60" rx="6" fill="#fff3e0" stroke="#ffc107" stroke-width="1"/>
  <text x="60" y="138" fill="#856404" font-size="11" font-weight="bold">总线初始化 / 复位脉冲：</text>
  <text x="60" y="154" fill="#856404" font-size="11">主设备拉低总线 480 μs → 释放 → 从设备在 15-60 μs 后拉低总线 60-240 μs（存在脉冲），主设备检测到即为"有设备在线"。</text>
  <text x="60" y="172" fill="#856404" font-size="11">每个 1-Wire 设备内置约 800 pF 电容，数据线高电平时充电、低电平时由电容供电（寄生供电），因此仅需一根信号线 + 地线。</text>

  <!-- Legend -->
  <rect x="40" y="195" width="12" height="12" rx="2" fill="#0d6efd"/>
  <text x="58" y="205" fill="#495057" font-size="11">写 1（主设备短拉低）</text>
  <rect x="220" y="195" width="12" height="12" rx="2" fill="#fd7e14"/>
  <text x="238" y="205" fill="#495057" font-size="11">写 0（主设备长拉低）</text>
  <rect x="380" y="195" width="12" height="12" rx="2" fill="#198754"/>
  <text x="398" y="205" fill="#495057" font-size="11">读（从设备在采样窗口拉低或不拉）</text>
  <rect x="600" y="195" width="12" height="12" rx="2" fill="#9c27b0"/>
  <text x="618" y="205" fill="#495057" font-size="11">存在脉冲（从设备应答）</text>

  <!-- Time bar -->
  <line x1="50" y1="235" x2="850" y2="235" stroke="#e9ecef" stroke-width="1"/>
  <text x="50" y="248" fill="#495057" font-size="11">t=0</text>
  <text x="170" y="248" fill="#495057" font-size="11">60 μs</text>
  <text x="370" y="248" fill="#495057" font-size="11">120 μs</text>
  <text x="570" y="248" fill="#495057" font-size="11">180 μs</text>
  <text x="780" y="248" fill="#495057" font-size="11">240 μs</text>
  <text x="810" y="248" fill="#495057" font-size="11">→</text>
  <text x="450" y="248" fill="#343a40" font-size="11" text-anchor="middle">每个时间槽 = 60 μs（标准模式）</text>
</svg>
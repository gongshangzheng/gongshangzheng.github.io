<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="monospace" font-size="13">
  <rect width="900" height="340" fill="#f8f9fa"/>

  <text x="450" y="24" fill="#212529" font-size="15" font-weight="bold" text-anchor="middle">CAN 总线差分信号：显性 vs 隐性</text>

  <!-- CAN-H line -->
  <text x="12" y="72" fill="#495057" font-size="12">CAN-H</text>
  <line x1="50" y1="68" x2="850" y2="68" stroke="#6c757d" stroke-width="2"/>

  <!-- CAN-L line -->
  <text x="12" y="152" fill="#495057" font-size="12">CAN-L</text>
  <line x1="50" y1="148" x2="850" y2="148" stroke="#6c757d" stroke-width="2"/>

  <!-- Differential (CAN-H - CAN-L) -->
  <text x="12" y="222" fill="#495057" font-size="12">差分电压</text>
  <line x1="50" y1="218" x2="850" y2="218" stroke="#e9ecef" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="50" y1="260" x2="850" y2="260" stroke="#e9ecef" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="60" y="240" fill="#343a40" font-size="11">0 V</text>

  <!-- Bit 1 region: RECESSIVE (both ~2.5V, diff ~0V) -->
  <text x="190" y="56" fill="#198754" font-size="12" text-anchor="middle" font-weight="bold">隐性 (1)</text>
  <!-- CAN-H: ~2.5V (y=93) -->
  <line x1="80" y1="93" x2="340" y2="93" stroke="#0d6efd" stroke-width="3"/>
  <!-- CAN-L: ~2.5V (y=123) -->
  <line x1="80" y1="123" x2="340" y2="123" stroke="#0d6efd" stroke-width="3"/>
  <!-- Differential area: ~0V (flat at y=218) -->
  <rect x="80" y="108" width="260" height="120" rx="4" fill="#198754" opacity="0.07"/>
  <text x="210" y="180" fill="#198754" font-size="12" text-anchor="middle">Vdiff ≈ 0 V</text>
  <text x="210" y="200" fill="#198754" font-size="11" text-anchor="middle">(隐性)</text>

  <!-- Separator between bits -->
  <line x1="340" y1="40" x2="340" y2="280" stroke="#e9ecef" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Bit 0 region: DOMINANT (CAN-H=3.5V, CAN-L=1.5V, diff=2V) -->
  <text x="570" y="56" fill="#dc3545" font-size="12" text-anchor="middle" font-weight="bold">显性 (0)</text>
  <!-- CAN-H: ~3.5V (y=68) -->
  <polyline points="340,93 380,93 380,55 620,55 620,93 660,93" fill="none" stroke="#dc3545" stroke-width="3"/>
  <!-- CAN-L: ~1.5V (y=163) -->
  <polyline points="340,123 380,123 380,168 620,168 620,123 660,123" fill="none" stroke="#dc3545" stroke-width="3"/>
  <!-- Differential area: ~2V -->
  <rect x="380" y="62" width="240" height="120" rx="4" fill="#dc3545" opacity="0.10"/>
  <text x="550" y="180" fill="#dc3545" font-size="12" text-anchor="middle">Vdiff ≈ +2 V</text>
  <text x="550" y="200" fill="#dc3545" font-size="11" text-anchor="middle">(显性)</text>

  <!-- Voltage labels on right -->
  <text x="845" y="62" fill="#0d6efd" font-size="11" text-anchor="end">3.5 V</text>
  <text x="845" y="127" fill="#0d6efd" font-size="11" text-anchor="end">1.5 V</text>
  <text x="845" y="170" fill="#0d6efd" font-size="11" text-anchor="end">2.5 V (隐性)</text>
  <text x="845" y="96" fill="#0d6efd" font-size="11" text-anchor="end">2.5 V (隐性)</text>

  <!-- Key insight box -->
  <rect x="40" y="270" width="820" height="55" rx="8" fill="#fff3e0" stroke="#ffc107" stroke-width="1.5"/>
  <text x="60" y="290" fill="#856404" font-size="12" font-weight="bold">关键原理：</text>
  <text x="60" y="308" fill="#856404" font-size="12">电磁干扰（EMI）同时耦合到 CAN-H 和 CAN-L 两根线上，幅度和相位相同。</text>
  <text x="60" y="326" fill="#856404" font-size="12">接收端用差分放大器只取两线电压差，共模干扰在差分运算中被抵消——这就是 CAN 在汽车引擎旁稳定工作的根本原因。</text>

  <!-- Legend -->
  <rect x="40" y="230" width="12" height="12" rx="2" fill="#198754" opacity="0.3"/>
  <text x="58" y="240" fill="#495057" font-size="11">隐性 (1)：两根线电位相等，差分 ≈ 0 V</text>
  <rect x="260" y="230" width="12" height="12" rx="2" fill="#dc3545" opacity="0.3"/>
  <text x="278" y="240" fill="#495057" font-size="11">显性 (0)：CAN-H 被拉高，CAN-L 被拉低，差分 = +2 V</text>
  <line x1="420" y1="236" x2="444" y2="236" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="240" fill="#495057" font-size="11">位边界</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1c1914"/>
  
  <!-- Sun body -->
  <circle cx="256" cy="256" r="80" fill="#d4a017"/>
  
  <!-- Sun rays — 12 rays, alternating long and short -->
  <!-- Long rays -->
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(0 256 256)"/>
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(60 256 256)"/>
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(120 256 256)"/>
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(180 256 256)"/>
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(240 256 256)"/>
  <rect x="252" y="80" width="8" height="60" rx="4" fill="#d4a017" transform="rotate(300 256 256)"/>
  
  <!-- Short rays (between long rays) -->
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(30 256 256)"/>
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(90 256 256)"/>
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(150 256 256)"/>
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(210 256 256)"/>
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(270 256 256)"/>
  <rect x="253" y="110" width="6" height="40" rx="3" fill="#c49520" transform="rotate(330 256 256)"/>
  
  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.3"/>
</svg>

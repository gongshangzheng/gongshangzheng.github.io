<!-- Search dropdown panel -->
<div class="search-overlay" id="search-overlay"></div>
<div class="search-dropdown" id="search-dropdown">
  <div class="search-dropdown-inner">
    <div class="search-input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search posts..." autocomplete="off">
      <kbd class="search-kbd" id="search-kbd-close">ESC</kbd>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-hint">输入关键词搜索文章</div>
    </div>
  </div>
</div>

<!-- Floating bottom-right: music + TOC + back-to-top -->
<div class="float-btns" id="float-btns">
  <button class="float-btn" id="float-toc-btn" aria-label="目录" title="目录">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
  {{#audio_src}}
  <button class="float-btn float-music" id="float-music-btn" aria-label="背景音乐" title="背景音乐">♫</button>
  {{/audio_src}}
  <button class="float-btn float-back" id="back-to-top" aria-label="回到顶部" title="回到顶部">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
</div>

<!-- Mobile TOC drawer -->
<div class="mobile-toc-overlay" id="mobile-toc-overlay"></div>
<div class="mobile-toc-drawer" id="mobile-toc-drawer">
  <div class="mobile-toc-header">
    <span>目录</span>
    <button class="mobile-toc-close" id="mobile-toc-close" aria-label="关闭">✕</button>
  </div>
  <nav class="mobile-toc-nav" id="mobile-toc-nav"></nav>
</div>
